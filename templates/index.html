<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#5865f2">
    <title>채팅</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { 
            height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            background: #36393f;
            color: #dcddde;
            overflow: hidden;
        }
        button, input, textarea { font-family: inherit; }
        
        #login {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #5865f2 0%, #7c3aed 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        #login-box {
            background: #36393f; padding: 30px; border-radius: 12px;
            width: 85%; max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            text-align: center;
        }
        .form-title { color: white; font-size: 20px; margin-bottom: 20px; font-weight: bold; }
        #login-box input {
            width: 100%; padding: 12px; font-size: 16px;
            background: #202225; color: white;
            border: 1px solid #202225; border-radius: 8px;
            outline: none; margin-bottom: 12px;
        }
        #login-box input:focus { border-color: #5865f2; }
        #login-box button {
            width: 100%; padding: 12px; font-size: 16px;
            background: #5865f2; color: white;
            border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold;
            margin-bottom: 8px;
        }
        #login-box button:hover { background: #4752c4; }
        #login-box button.secondary {
            background: transparent; color: #b9bbbe;
        }
        #login-error { color: #ed4245; font-size: 13px; margin-top: 8px; min-height: 18px; }
        
        #app { display: none; height: 100vh; height: 100dvh; }
        
        #sidebar {
            width: 260px; background: #2f3136;
            display: flex; flex-direction: column;
            flex-shrink: 0;
        }
        #sidebar-header {
            padding: 12px; background: #292b2f;
            display: flex; align-items: center; gap: 8px;
            cursor: pointer;
        }
        #sidebar-header:hover { background: #34373c; }
        #sidebar-header .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: #5865f2; display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0; overflow: hidden;
        }
        #sidebar-header .avatar img { width: 100%; height: 100%; object-fit: cover; }
        #sidebar-header .nick-info { flex: 1; min-width: 0; }
        #sidebar-header .nick-info .name { color: white; font-weight: bold; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #sidebar-header .nick-info .status { color: #b9bbbe; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #logout-btn {
            background: none; border: none; color: #b9bbbe;
            cursor: pointer; font-size: 18px; padding: 4px 8px;
        }
        #logout-btn:hover { color: white; }
        #sidebar-content { flex: 1; overflow-y: auto; }
        
        .section { padding: 8px 12px; }
        .section-title {
            font-size: 11px; text-transform: uppercase; color: #8e9297;
            font-weight: bold; padding: 8px 4px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .add-btn {
            background: none; border: none; color: #8e9297;
            font-size: 18px; cursor: pointer; padding: 0 4px;
        }
        .add-btn:hover { color: white; }
        
        .item {
            padding: 8px 10px; border-radius: 4px; cursor: pointer;
            color: #8e9297; margin: 1px 0;
            display: flex; align-items: center; gap: 8px;
            font-size: 14px;
        }
        .item:hover { background: #36393f; color: #dcddde; }
        .item.active { background: #404249; color: white; }
        .item .icon { width: 18px; text-align: center; flex-shrink: 0; }
        .item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item .count { 
            font-size: 11px; background: #5865f2; color: white;
            padding: 1px 6px; border-radius: 8px; flex-shrink: 0;
        }
        .lock-icon { font-size: 11px; opacity: 0.6; }
        
        #main {
            flex: 1; display: flex; flex-direction: column;
            background: #36393f; min-width: 0;
        }
        #main-header {
            padding: 12px 16px; background: #36393f;
            border-bottom: 1px solid #202225;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        #main-header h2 { color: white; font-size: 16px; }
        #main-header-right { display: flex; align-items: center; gap: 12px; }
        #delete-room-btn {
            display: none; background: none; border: none;
            color: #ed4245; cursor: pointer; font-size: 18px;
        }
        
        #menu-btn {
            display: none; background: none; border: none;
            color: white; font-size: 24px; cursor: pointer;
            margin-right: 10px;
        }
        
        #chat {
            flex: 1; overflow-y: auto;
            padding: 16px;
        }
        #welcome {
            text-align: center; color: #8e9297;
            margin-top: 50px; font-size: 14px;
            line-height: 1.8;
        }
        
        .msg-wrap { 
            margin: 8px 0; display: flex; flex-direction: column;
            position: relative;
        }
        .msg-wrap.me { align-items: flex-end; }
        
        .msg-wrap .nick-row {
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 2px; padding: 0 4px;
        }
        .me .nick-row { display: none; }
        .nick-row .msg-avatar {
            width: 22px; height: 22px; border-radius: 50%;
            background: #4f545c; display: flex; align-items: center; justify-content: center;
            font-size: 11px; overflow: hidden;
            cursor: pointer;
        }
        .nick-row .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .nick-row .nick { 
            font-size: 12px; color: #b9bbbe;
            cursor: pointer;
        }
        .nick-row .nick:hover { text-decoration: underline; }
        
        .bubble-wrap {
            display: flex; align-items: center; gap: 6px;
            max-width: 75%;
        }
        .me .bubble-wrap { flex-direction: row-reverse; }
        
        .bubble {
            padding: 10px 14px; border-radius: 12px;
            font-size: 14px; line-height: 1.4;
            word-break: break-word; white-space: pre-wrap;
            max-width: 100%;
        }
        .other .bubble { background: #4f545c; color: white; border-top-left-radius: 4px; }
        .me .bubble { background: #5865f2; color: white; border-top-right-radius: 4px; }
        
        .delete-btn {
            background: none; border: none; color: #72767d;
            cursor: pointer; font-size: 14px; padding: 4px;
            opacity: 0; transition: opacity 0.15s;
        }
        .me:hover .delete-btn,
        .me .msg-wrap:hover .delete-btn { opacity: 1; }
        @media (max-width: 768px) {
            .delete-btn { opacity: 0.5; }
        }
        .delete-btn:hover { color: #ed4245; }
        
        .system {
            text-align: center; color: #72767d; font-size: 12px;
            padding: 4px 0; margin: 8px 0;
        }
        
        #typing-indicator {
            padding: 0 16px; height: 20px;
            font-size: 12px; color: #b9bbbe; font-style: italic;
        }
        
        #inputs {
            display: flex; gap: 8px; padding: 12px;
            background: #36393f;
            flex-shrink: 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        #msg {
            flex: 1; padding: 11px 14px; font-size: 15px;
            background: #40444b; color: white;
            border: none; border-radius: 8px; outline: none;
        }
        #msg:disabled { opacity: 0.5; }
        #send-btn {
            padding: 11px 18px; font-size: 14px;
            background: #5865f2; color: white;
            border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold;
        }
        #send-btn:disabled { background: #4f545c; opacity: 0.5; }
        
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center;
            z-index: 150; padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: #36393f; padding: 24px; border-radius: 8px;
            width: 100%; max-width: 420px;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-box h3 { color: white; margin-bottom: 16px; }
        .modal-box input, .modal-box textarea {
            width: 100%; padding: 10px; font-size: 14px;
            background: #202225; color: white;
            border: 1px solid #202225; border-radius: 4px;
            outline: none; margin-bottom: 12px;
            font-family: inherit;
        }
        .modal-box textarea { resize: vertical; min-height: 60px; }
        .modal-box input:focus, .modal-box textarea:focus { border-color: #5865f2; }
        .modal-box label { display: block; color: #b9bbbe; font-size: 12px; margin-bottom: 4px; font-weight: bold; }
        .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
        .modal-buttons button {
            padding: 10px 20px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .btn-cancel { background: transparent; color: white; }
        .btn-confirm { background: #5865f2; color: white; }
        .btn-confirm:hover { background: #4752c4; }
        
        .profile-header {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 20px;
        }
        .profile-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background: #5865f2; display: flex; align-items: center; justify-content: center;
            font-size: 50px; margin-bottom: 12px;
            overflow: hidden; cursor: pointer;
            position: relative;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-avatar.editable::after {
            content: '📷'; position: absolute; bottom: 0; right: 0;
            background: #5865f2; width: 28px; height: 28px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; border: 2px solid #36393f;
        }
        .profile-name { color: white; font-size: 20px; font-weight: bold; }
        .profile-status-text { color: #b9bbbe; font-size: 13px; margin-top: 4px; }
        .profile-info-row { 
            background: #2f3136; padding: 10px 12px; border-radius: 4px;
            margin-bottom: 8px; color: #dcddde; font-size: 14px;
        }
        .profile-info-row .label-text { color: #8e9297; font-size: 12px; margin-bottom: 2px; }
        
        .emoji-grid {
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
            margin: 12px 0; max-height: 180px; overflow-y: auto;
            padding: 8px; background: #2f3136; border-radius: 4px;
        }
        .emoji-btn {
            background: transparent; border: none; cursor: pointer;
            font-size: 22px; padding: 6px; border-radius: 4px;
        }
        .emoji-btn:hover { background: #40444b; }
        .emoji-btn.selected { background: #5865f2; }
        
        .upload-status {
            color: #b9bbbe; font-size: 12px; text-align: center;
            margin: 8px 0; min-height: 18px;
        }
        
        @media (max-width: 768px) {
            #sidebar {
                position: fixed; top: 0; bottom: 0; left: 0;
                z-index: 50; transform: translateX(-100%);
                transition: transform 0.2s;
            }
            #sidebar.show { transform: translateX(0); }
            #menu-btn { display: block; }
            #sidebar-overlay {
                position: fixed; inset: 0; background: rgba(0,0,0,0.5);
                z-index: 40; display: none;
            }
            #sidebar-overlay.show { display: block; }
        }
    </style>
</head>
<body>
    <div id="login">
        <div id="login-box">
            <div class="form-title" id="form-title">💬 로그인</div>
            <input id="nickname-input" placeholder="닉네임 (12자 이내)" maxlength="12">
            <input id="password-input" type="password" placeholder="비밀번호 (4자 이상)">
            <button id="primary-btn" onclick="submitForm()">로그인</button>
            <button class="secondary" onclick="toggleMode()" id="toggle-btn">계정이 없나요? 회원가입</button>
            <div id="login-error"></div>
        </div>
    </div>
    
    <div id="app">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <div id="sidebar">
            <div id="sidebar-header" onclick="showMyProfile()">
                <div class="avatar" id="my-avatar">😀</div>
                <div class="nick-info">
                    <div class="name" id="my-nick">닉네임</div>
                    <div class="status" id="my-status">상태 메시지</div>
                </div>
                <button id="logout-btn" onclick="event.stopPropagation(); logout()" title="로그아웃">⏻</button>
            </div>
            <div id="sidebar-content">
                <div class="section">
                    <div class="section-title">
                        <span>채팅방</span>
                        <button class="add-btn" onclick="showCreateRoom()">+</button>
                    </div>
                    <div id="room-list"></div>
                </div>
                <div class="section">
                    <div class="section-title">
                        <span>접속자 (<span id="user-count">0</span>)</span>
                    </div>
                    <div id="user-list"></div>
                </div>
            </div>
        </div>
        
        <div id="main">
            <div id="main-header">
                <div style="display:flex; align-items:center; min-width:0;">
                    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
                    <h2 id="current-room-name">방을 선택하세요</h2>
                </div>
                <div id="main-header-right">
                    <button id="delete-room-btn" onclick="deleteRoom()" title="방 삭제">🗑️</button>
                </div>
            </div>
            <div id="chat">
                <div id="welcome">
                    👈 왼쪽에서 채팅방을 선택하거나<br>
                    접속자를 클릭해서 DM을 시작하세요
                </div>
            </div>
            <div id="typing-indicator"></div>
            <div id="inputs">
                <input id="msg" placeholder="메시지 입력..." autocomplete="off" disabled>
                <button id="send-btn" onclick="sendMsg()" disabled>전송</button>
            </div>
        </div>
    </div>
    
    <div id="create-modal" class="modal">
        <div class="modal-box">
            <h3>새 채팅방 만들기</h3>
            <input id="room-name" placeholder="방 이름 (20자 이내)" maxlength="20">
            <input id="room-pw" type="password" placeholder="비밀번호 (선택)">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideCreateRoom()">취소</button>
                <button class="btn-confirm" onclick="createRoom()">만들기</button>
            </div>
        </div>
    </div>
    
    <div id="pw-modal" class="modal">
        <div class="modal-box">
            <h3 id="pw-modal-title">비밀번호 입력</h3>
            <input id="join-pw" type="password" placeholder="비밀번호">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hidePwModal()">취소</button>
                <button class="btn-confirm" onclick="joinWithPw()">입장</button>
            </div>
        </div>
    </div>
    
    <div id="profile-modal" class="modal">
        <div class="modal-box">
            <div class="profile-header">
                <div class="profile-avatar" id="view-avatar">😀</div>
                <div class="profile-name" id="view-name">닉네임</div>
                <div class="profile-status-text" id="view-status"></div>
            </div>
            <div class="profile-info-row">
                <div class="label-text">자기소개</div>
                <div id="view-bio">없음</div>
            </div>
            <div class="profile-info-row">
                <div class="label-text">가입일</div>
                <div id="view-joined">-</div>
            </div>
            <div class="profile-info-row" id="view-online-row">
                <div class="label-text">상태</div>
                <div id="view-online">-</div>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideProfileView()">닫기</button>
                <button class="btn-confirm" id="profile-action-btn" style="display:none;" onclick="profileAction()">DM 보내기</button>
                <button class="btn-confirm" id="profile-edit-btn" style="display:none;" onclick="showEditProfile()">편집</button>
            </div>
        </div>
    </div>
    
    <div id="edit-profile-modal" class="modal">
        <div class="modal-box">
            <h3>프로필 편집</h3>
            <div class="profile-header">
                <div class="profile-avatar editable" id="edit-avatar" onclick="document.getElementById('avatar-file').click()">😀</div>
                <input type="file" id="avatar-file" accept="image/*" style="display:none;" onchange="uploadAvatar(event)">
                <div class="upload-status" id="upload-status"></div>
            </div>
            
            <label>이모지 선택</label>
            <div class="emoji-grid" id="emoji-grid"></div>
            
            <label>자기소개</label>
            <textarea id="edit-bio" placeholder="자기소개를 입력하세요 (100자 이내)" maxlength="100"></textarea>
            
            <label>상태 메시지</label>
            <input id="edit-status" placeholder="상태 메시지 (50자 이내)" maxlength="50">
            
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideEditProfile()">취소</button>
                <button class="btn-confirm" onclick="saveProfile()">저장</button>
            </div>
        </div>
    </div>

    <script>
        // Supabase 클라이언트 (변수명 sb로 - supabase 충돌 방지)
        const SUPABASE_URL = '{{ supabase_url }}';
        const SUPABASE_KEY = '{{ supabase_key }}';
        let sb = null;
        if (SUPABASE_URL && SUPABASE_KEY && window.supabase) {
            sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
        
        let socket = null;
        let myNick = '';
        let myUserId = null;
        let myProfile = { avatar: '😀', bio: '', status: '' };
        let currentRoom = null;
        let currentRoomType = null;
        let currentRoomCreator = null;
        let pendingJoinRoomId = null;
        let typingTimer = null;
        let isTyping = false;
        let typingUsers = new Set();
        let isLoginMode = true;
        let viewingProfileNick = null;
        let editingAvatar = '😀';
        
        const EMOJIS = ['😀','😎','🤓','🥳','🤖','👻','🐱','🐶','🐼','🦊','🐸','🦄','🐲','🦁','🐯','🐰','🐻','🐧','🦋','🌸','🌺','🌻','🌷','🌹','⭐','🔥','💎','🎮','🎨','🎵','⚽','🏀','🚀','🛸','🌈','☀️','🌙','❄️','🍎','🍕','🍔','🍰','🎂','☕','🌍','🗻','🏖️','🏰'];
        
        window.addEventListener('load', () => {
            const savedNick = localStorage.getItem('nick');
            const savedPw = localStorage.getItem('pw');
            if (savedNick && savedPw) {
                document.getElementById('nickname-input').value = savedNick;
                document.getElementById('password-input').value = savedPw;
                submitForm();
            }
            
            const grid = document.getElementById('emoji-grid');
            EMOJIS.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'emoji-btn';
                btn.textContent = emoji;
                btn.onclick = () => selectEmoji(emoji);
                grid.appendChild(btn);
            });
        });

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').textContent = isLoginMode ? '💬 로그인' : '✨ 회원가입';
            document.getElementById('primary-btn').textContent = isLoginMode ? '로그인' : '회원가입';
            document.getElementById('toggle-btn').textContent = isLoginMode 
                ? '계정이 없나요? 회원가입' 
                : '이미 계정이 있나요? 로그인';
            document.getElementById('login-error').textContent = '';
        }

        async function submitForm() {
            const nick = document.getElementById('nickname-input').value.trim();
            const pw = document.getElementById('password-input').value;
            const errEl = document.getElementById('login-error');
            
            if (!nick) { errEl.textContent = '닉네임을 입력하세요'; return; }
            if (pw.length < 4) { errEl.textContent = '비밀번호는 4자 이상'; return; }
            
            const url = isLoginMode ? '/api/login' : '/api/register';
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({nickname: nick, password: pw})
                });
                const data = await res.json();
                
                if (!res.ok) {
                    errEl.textContent = data.error || '오류가 발생했습니다';
                    return;
                }
                
                if (!isLoginMode) {
                    isLoginMode = true;
                    await submitForm();
                    return;
                }
                
                localStorage.setItem('nick', nick);
                localStorage.setItem('pw', pw);
                myNick = nick;
                myUserId = data.user_id;
                myProfile = {
                    avatar: data.avatar || '😀',
                    bio: data.bio || '',
                    status: data.status || ''
                };
                connectSocket();
            } catch(e) {
                errEl.textContent = '네트워크 오류';
            }
        }
        
        function logout() {
            if (!confirm('로그아웃 하시겠습니까?')) return;
            localStorage.removeItem('nick');
            localStorage.removeItem('pw');
            location.reload();
        }
        
        function renderMyProfile() {
            const avatarEl = document.getElementById('my-avatar');
            avatarEl.innerHTML = '';
            if (myProfile.avatar.startsWith('http')) {
                const img = document.createElement('img');
                img.src = myProfile.avatar;
                avatarEl.appendChild(img);
            } else {
                avatarEl.textContent = myProfile.avatar;
            }
            document.getElementById('my-nick').textContent = myNick;
            document.getElementById('my-status').textContent = myProfile.status || myProfile.bio || '온라인';
        }
        
        function connectSocket() {
            socket = io();
            
            socket.on('connect', () => {
                socket.emit('connect_user', { nickname: myNick, user_id: myUserId });
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                renderMyProfile();
                
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            });
            
            socket.on('force_logout', (msg) => { alert(msg); logout(); });
            socket.on('user_list', renderUserList);
            socket.on('room_list', renderRoomList);
            
            socket.on('room_created', (data) => {
                hideCreateRoom();
                socket.emit('join_room', { room_id: data.id });
            });
            
            socket.on('room_deleted', (data) => {
                alert(data.message);
                currentRoom = null;
                currentRoomType = null;
                document.getElementById('current-room-name').textContent = '방을 선택하세요';
                document.getElementById('chat').innerHTML = '<div id="welcome">방이 삭제되었습니다.<br>다른 방을 선택해주세요.</div>';
                document.getElementById('msg').disabled = true;
                document.getElementById('send-btn').disabled = true;
                document.getElementById('delete-room-btn').style.display = 'none';
            });
            
            socket.on('join_success', (data) => {
                currentRoom = data.room_id;
                currentRoomType = data.type;
                currentRoomCreator = data.created_by;
                document.getElementById('current-room-name').textContent = data.room_name;
                document.getElementById('chat').innerHTML = '';
                document.getElementById('msg').disabled = false;
                document.getElementById('send-btn').disabled = false;
                document.getElementById('msg').focus();
                
                if (data.type === 'room' && data.created_by === myNick) {
                    document.getElementById('delete-room-btn').style.display = 'block';
                } else {
                    document.getElementById('delete-room-btn').style.display = 'none';
                }
                
                typingUsers.clear();
                updateTypingIndicator();
                hideSidebarMobile();
                
                if (data.history && data.history.length > 0) {
                    addSystem('━━ 이전 대화 ━━');
                    data.history.forEach(m => {
                        addMessage(m.id, m.nickname, m.msg, m.avatar);
                    });
                    addSystem('━━ 새 메시지 ━━');
                }
            });
            
            socket.on('join_error', (msg) => { alert(msg); hidePwModal(); });
            socket.on('error_msg', (msg) => alert(msg));
            
            socket.on('message', (data) => {
                addMessage(data.id, data.nickname, data.msg, data.avatar);
                
                if (data.nickname !== myNick) {
                    playDing();
                    if ('vibrate' in navigator) navigator.vibrate(100);
                    
                    if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
                        new Notification(data.nickname, { body: data.msg, tag: 'chat-msg' });
                    }
                }
            });
            
            socket.on('message_deleted', (data) => {
                const el = document.querySelector('[data-msg-id="' + data.msg_id + '"]');
                if (el) el.remove();
            });
            
            socket.on('system', addSystem);
            
            socket.on('typing', (data) => {
                if (data.typing) typingUsers.add(data.nickname);
                else typingUsers.delete(data.nickname);
                updateTypingIndicator();
            });
        }
        
        function renderRoomList(list) {
            const div = document.getElementById('room-list');
            div.innerHTML = '';
            if (list.length === 0) {
                div.innerHTML = '<div style="color:#72767d; font-size:12px; padding:8px;">방이 없습니다</div>';
                return;
            }
            list.forEach(room => {
                const item = document.createElement('div');
                item.className = 'item' + (room.id === currentRoom ? ' active' : '');
                item.innerHTML = '<span class="icon">#</span>' +
                    '<span class="name">' + escapeHtml(room.name) + '</span>' +
                    (room.has_password ? '<span class="lock-icon">🔒</span>' : '') +
                    '<span class="count">' + room.user_count + '</span>';
                item.onclick = () => joinRoom(room.id, room.has_password, room.name);
                div.appendChild(item);
            });
        }
        
        function renderUserList(list) {
            const div = document.getElementById('user-list');
            div.innerHTML = '';
            document.getElementById('user-count').textContent = list.length;
            list.forEach(user => {
                if (user.nickname === myNick) return;
                const item = document.createElement('div');
                item.className = 'item';
                item.innerHTML = '<span class="icon" style="color:#3ba55c;">●</span>' +
                    '<span class="name">' + escapeHtml(user.nickname) + '</span>';
                item.onclick = () => showProfile(user.nickname);
                div.appendChild(item);
            });
        }
        
        function joinRoom(roomId, hasPassword, roomName) {
            if (hasPassword) {
                pendingJoinRoomId = roomId;
                document.getElementById('pw-modal-title').textContent = '🔒 ' + roomName;
                document.getElementById('join-pw').value = '';
                document.getElementById('pw-modal').classList.add('show');
                document.getElementById('join-pw').focus();
            } else {
                socket.emit('join_room', { room_id: roomId });
            }
        }
        
        function joinWithPw() {
            const pw = document.getElementById('join-pw').value;
            socket.emit('join_room', { room_id: pendingJoinRoomId, password: pw });
            hidePwModal();
        }
        
        function hidePwModal() { document.getElementById('pw-modal').classList.remove('show'); }
        
        function deleteRoom() {
            if (!currentRoom || currentRoomType !== 'room') return;
            if (!confirm('정말 이 방을 삭제할까요?\n안에 있는 모든 메시지도 삭제됩니다.')) return;
            socket.emit('delete_room', { room_id: currentRoom });
        }
        
        function deleteMessage(msgId) {
            if (!confirm('이 메시지를 삭제할까요?')) return;
            socket.emit('delete_message', { msg_id: msgId });
        }
        
        function showCreateRoom() {
            document.getElementById('room-name').value = '';
            document.getElementById('room-pw').value = '';
            document.getElementById('create-modal').classList.add('show');
            document.getElementById('room-name').focus();
        }
        
        function hideCreateRoom() { document.getElementById('create-modal').classList.remove('show'); }
        
        function createRoom() {
            const name = document.getElementById('room-name').value.trim();
            const pw = document.getElementById('room-pw').value.trim();
            if (!name) { alert('방 이름을 입력하세요'); return; }
            socket.emit('create_room', { name: name, password: pw });
        }
        
        function sendMsg() {
            const input = document.getElementById('msg');
            const msg = input.value.trim();
            if (!msg || !currentRoom) return;
            socket.emit('message', { msg: msg });
            input.value = '';
            input.focus();
            
            if (isTyping) {
                isTyping = false;
                socket.emit('typing', { typing: false });
            }
        }
        
        function addMessage(msgId, nickname, msg, avatar) {
            const chat = document.getElementById('chat');
            const wrap = document.createElement('div');
            wrap.className = 'msg-wrap ' + (nickname === myNick ? 'me' : 'other');
            if (msgId) wrap.setAttribute('data-msg-id', msgId);
            
            if (nickname !== myNick) {
                const nickRow = document.createElement('div');
                nickRow.className = 'nick-row';
                
                const av = document.createElement('div');
                av.className = 'msg-avatar';
                if (avatar && avatar.startsWith('http')) {
                    const img = document.createElement('img');
                    img.src = avatar;
                    av.appendChild(img);
                } else {
                    av.textContent = avatar || '😀';
                }
                av.onclick = () => showProfile(nickname);
                
                const nickEl = document.createElement('span');
                nickEl.className = 'nick';
                nickEl.textContent = nickname;
                nickEl.onclick = () => showProfile(nickname);
                
                nickRow.appendChild(av);
                nickRow.appendChild(nickEl);
                wrap.appendChild(nickRow);
            }
            
            const bubbleWrap = document.createElement('div');
            bubbleWrap.className = 'bubble-wrap';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = msg;
            
            bubbleWrap.appendChild(bubble);
            
            if (nickname === myNick && msgId) {
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = '🗑️';
                delBtn.onclick = () => deleteMessage(msgId);
                bubbleWrap.appendChild(delBtn);
            }
            
            wrap.appendChild(bubbleWrap);
            chat.appendChild(wrap);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function addSystem(msg) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'system';
            div.textContent = msg;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function updateTypingIndicator() {
            const div = document.getElementById('typing-indicator');
            const arr = Array.from(typingUsers);
            if (arr.length === 0) div.textContent = '';
            else if (arr.length === 1) div.textContent = arr[0] + '님이 입력 중...';
            else if (arr.length === 2) div.textContent = arr[0] + ', ' + arr[1] + '님이 입력 중...';
            else div.textContent = arr.length + '명이 입력 중...';
        }
        
        async function showProfile(nickname) {
            viewingProfileNick = nickname;
            try {
                const res = await fetch('/api/profile/' + encodeURIComponent(nickname));
                const data = await res.json();
                if (!res.ok) { alert(data.error); return; }
                
                const avatarEl = document.getElementById('view-avatar');
                avatarEl.innerHTML = '';
                if (data.avatar && data.avatar.startsWith('http')) {
                    const img = document.createElement('img');
                    img.src = data.avatar;
                    avatarEl.appendChild(img);
                } else {
                    avatarEl.textContent = data.avatar || '😀';
                }
                document.getElementById('view-name').textContent = data.nickname;
                document.getElementById('view-status').textContent = data.status || '';
                document.getElementById('view-bio').textContent = data.bio || '없음';
                
                if (data.created_at) {
                    const d = new Date(data.created_at);
                    document.getElementById('view-joined').textContent = 
                        d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';
                }
                document.getElementById('view-online').textContent = data.is_online ? '🟢 온라인' : '⚫ 오프라인';
                
                if (nickname === myNick) {
                    document.getElementById('profile-action-btn').style.display = 'none';
                    document.getElementById('profile-edit-btn').style.display = 'block';
                } else {
                    document.getElementById('profile-action-btn').style.display = data.is_online ? 'block' : 'none';
                    document.getElementById('profile-edit-btn').style.display = 'none';
                }
                
                document.getElementById('profile-modal').classList.add('show');
            } catch(e) {
                alert('프로필을 불러올 수 없습니다');
            }
        }
        
        function showMyProfile() { showProfile(myNick); }
        function hideProfileView() { document.getElementById('profile-modal').classList.remove('show'); }
        
        function profileAction() {
            socket.emit('start_dm', { nickname: viewingProfileNick });
            hideProfileView();
            hideSidebarMobile();
        }
        
        function showEditProfile() {
            hideProfileView();
            editingAvatar = myProfile.avatar;
            updateEditAvatar();
            document.getElementById('edit-bio').value = myProfile.bio;
            document.getElementById('edit-status').value = myProfile.status;
            document.getElementById('upload-status').textContent = '';
            
            document.querySelectorAll('.emoji-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.textContent === myProfile.avatar);
            });
            
            document.getElementById('edit-profile-modal').classList.add('show');
        }
        
        function hideEditProfile() { document.getElementById('edit-profile-modal').classList.remove('show'); }
        
        function selectEmoji(emoji) {
            editingAvatar = emoji;
            updateEditAvatar();
            document.querySelectorAll('.emoji-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.textContent === emoji);
            });
        }
        
        function updateEditAvatar() {
            const el = document.getElementById('edit-avatar');
            el.innerHTML = '';
            if (editingAvatar.startsWith('http')) {
                const img = document.createElement('img');
                img.src = editingAvatar;
                el.appendChild(img);
            } else {
                el.textContent = editingAvatar;
            }
        }
        
        async function uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!sb) {
                alert('이미지 업로드를 사용할 수 없습니다 (설정 오류)');
                return;
            }
            
            if (file.size > 2 * 1024 * 1024) {
                alert('파일 크기는 2MB 이하여야 합니다');
                return;
            }
            
            const status = document.getElementById('upload-status');
            status.textContent = '업로드 중...';
            
            try {
                const ext = file.name.split('.').pop();
                const filename = myNick + '_' + Date.now() + '.' + ext;
                
                const { data, error } = await sb.storage
                    .from('avatars')
                    .upload(filename, file, { upsert: true });
                
                if (error) throw error;
                
                const { data: urlData } = sb.storage
                    .from('avatars')
                    .getPublicUrl(filename);
                
                editingAvatar = urlData.publicUrl;
                updateEditAvatar();
                status.textContent = '✅ 업로드 완료';
                
                document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('selected'));
            } catch(e) {
                console.error(e);
                status.textContent = '❌ 업로드 실패: ' + e.message;
            }
        }
        
        async function saveProfile() {
            const pw = localStorage.getItem('pw');
            const bio = document.getElementById('edit-bio').value;
            const statusVal = document.getElementById('edit-status').value;
            
            try {
                const res = await fetch('/api/profile', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        nickname: myNick,
                        password: pw,
                        avatar: editingAvatar,
                        bio: bio,
                        status: statusVal
                    })
                });
                const data = await res.json();
                if (!res.ok) { alert(data.error); return; }
                
                myProfile = { avatar: editingAvatar, bio: bio, status: statusVal };
                renderMyProfile();
                hideEditProfile();
                alert('프로필이 저장되었습니다');
            } catch(e) {
                alert('저장 실패');
            }
        }
        
        function playDing() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch(e) {}
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
            document.getElementById('sidebar-overlay').classList.toggle('show');
        }
        
        function hideSidebarMobile() {
            document.getElementById('sidebar').classList.remove('show');
            document.getElementById('sidebar-overlay').classList.remove('show');
        }
        
        document.getElementById('msg').addEventListener('input', () => {
            if (!currentRoom) return;
            if (!isTyping) {
                isTyping = true;
                socket.emit('typing', { typing: true });
            }
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                isTyping = false;
                socket.emit('typing', { typing: false });
            }, 2000);
        });
        
        document.getElementById('msg').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });
        document.getElementById('nickname-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('password-input').focus(); });
        document.getElementById('password-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') submitForm(); });
        document.getElementById('room-name').addEventListener('keypress', (e) => { if (e.key === 'Enter') createRoom(); });
        document.getElementById('join-pw').addEventListener('keypress', (e) => { if (e.key === 'Enter') joinWithPw(); });
    </script>
</body>
