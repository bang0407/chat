<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#5865f2">
    <title>채팅</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { 
            height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            background: #36393f;
            color: #dcddde;
            overflow: hidden;
        }
        button, input { font-family: inherit; }
        
        /* 로그인 화면 */
        #login {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #5865f2 0%, #7c3aed 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        #login-box {
            background: #36393f; padding: 30px; border-radius: 12px;
            width: 85%; max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            text-align: center;
        }
        #login-box h2 { margin-bottom: 20px; color: white; }
        #login-box input {
            width: 100%; padding: 12px; font-size: 16px;
            background: #202225; color: white;
            border: 1px solid #202225; border-radius: 8px;
            outline: none; margin-bottom: 12px;
        }
        #login-box input:focus { border-color: #5865f2; }
        #login-box button {
            width: 100%; padding: 12px; font-size: 16px;
            background: #5865f2; color: white;
            border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold;
            margin-bottom: 8px;
        }
        #login-box button:hover { background: #4752c4; }
        #login-box button.secondary {
            background: transparent; color: #b9bbbe;
            margin-bottom: 0;
        }
        #login-box button.secondary:hover { color: white; background: transparent; }
        #login-error { color: #ed4245; font-size: 13px; margin-top: 8px; min-height: 18px; }
        .form-title { color: white; font-size: 20px; margin-bottom: 20px; font-weight: bold; }
        
        /* 메인 레이아웃 */
        #app { display: none; height: 100vh; height: 100dvh; }
        
        /* 사이드바 */
        #sidebar {
            width: 260px; background: #2f3136;
            display: flex; flex-direction: column;
            flex-shrink: 0;
        }
        #sidebar-header {
            padding: 14px; background: #292b2f;
            font-weight: bold; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        #logout-btn {
            background: none; border: none; color: #b9bbbe;
            cursor: pointer; font-size: 16px;
        }
        #logout-btn:hover { color: white; }
        #sidebar-content { flex: 1; overflow-y: auto; }
        
        .section { padding: 8px 12px; }
        .section-title {
            font-size: 11px; text-transform: uppercase; color: #8e9297;
            font-weight: bold; padding: 8px 4px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .add-btn {
            background: none; border: none; color: #8e9297;
            font-size: 18px; cursor: pointer; padding: 0 4px;
        }
        .add-btn:hover { color: white; }
        
        .item {
            padding: 8px 10px; border-radius: 4px; cursor: pointer;
            color: #8e9297; margin: 1px 0;
            display: flex; align-items: center; gap: 8px;
            font-size: 14px;
        }
        .item:hover { background: #36393f; color: #dcddde; }
        .item.active { background: #404249; color: white; }
        .item .icon { width: 18px; text-align: center; flex-shrink: 0; }
        .item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item .count { 
            font-size: 11px; 
            background: #5865f2; color: white;
            padding: 1px 6px; border-radius: 8px;
            flex-shrink: 0;
        }
        .lock-icon { font-size: 11px; opacity: 0.6; flex-shrink: 0; }
        
        /* 메인 콘텐츠 */
        #main {
            flex: 1; display: flex; flex-direction: column;
            background: #36393f; min-width: 0;
        }
        #main-header {
            padding: 12px 16px; background: #36393f;
            border-bottom: 1px solid #202225;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        #main-header h2 { color: white; font-size: 16px; }
        #main-header .user-count { font-size: 12px; color: #8e9297; }
        
        #menu-btn {
            display: none; background: none; border: none;
            color: white; font-size: 24px; cursor: pointer;
            margin-right: 10px;
        }
        
        /* 채팅창 */
        #chat {
            flex: 1; overflow-y: auto;
            padding: 16px;
        }
        #welcome {
            text-align: center; color: #8e9297;
            margin-top: 50px; font-size: 14px;
            line-height: 1.8;
        }
        
        .msg-wrap { margin: 8px 0; display: flex; flex-direction: column; }
        .msg-wrap.me { align-items: flex-end; }
        
        .msg-wrap .nick { 
            font-size: 12px; color: #b9bbbe; 
            margin-bottom: 2px; padding: 0 4px;
        }
        .me .nick { display: none; }
        
        .bubble {
            max-width: 75%; padding: 10px 14px; border-radius: 12px;
            font-size: 14px; line-height: 1.4;
            word-break: break-word; white-space: pre-wrap;
        }
        .other .bubble { background: #4f545c; color: white; border-top-left-radius: 4px; }
        .me .bubble { background: #5865f2; color: white; border-top-right-radius: 4px; }
        
        .system {
            text-align: center; color: #72767d; font-size: 12px;
            padding: 4px 0; margin: 8px 0;
        }
        
        /* 입력 중 */
        #typing-indicator {
            padding: 0 16px; height: 20px;
            font-size: 12px; color: #b9bbbe; font-style: italic;
            display: flex; align-items: center;
        }
        
        /* 입력창 */
        #inputs {
            display: flex; gap: 8px; padding: 12px;
            background: #36393f;
            flex-shrink: 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        #msg {
            flex: 1; padding: 11px 14px; font-size: 15px;
            background: #40444b; color: white;
            border: none; border-radius: 8px;
            outline: none;
        }
        #msg:disabled { opacity: 0.5; }
        #send-btn {
            padding: 11px 18px; font-size: 14px;
            background: #5865f2; color: white;
            border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold;
        }
        #send-btn:disabled { background: #4f545c; opacity: 0.5; }
        
        /* 모달 */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center;
            z-index: 150; padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: #36393f; padding: 24px; border-radius: 8px;
            width: 100%; max-width: 380px;
        }
        .modal-box h3 { color: white; margin-bottom: 16px; }
        .modal-box input {
            width: 100%; padding: 10px; font-size: 14px;
            background: #202225; color: white;
            border: 1px solid #202225; border-radius: 4px;
            outline: none; margin-bottom: 12px;
        }
        .modal-box input:focus { border-color: #5865f2; }
        .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-buttons button {
            padding: 10px 20px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .btn-cancel { background: transparent; color: white; }
        .btn-confirm { background: #5865f2; color: white; }
        .btn-confirm:hover { background: #4752c4; }
        
        /* 모바일 */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed; top: 0; bottom: 0; left: 0;
                z-index: 50; transform: translateX(-100%);
                transition: transform 0.2s;
            }
            #sidebar.show { transform: translateX(0); }
            #menu-btn { display: block; }
            #sidebar-overlay {
                position: fixed; inset: 0; background: rgba(0,0,0,0.5);
                z-index: 40; display: none;
            }
            #sidebar-overlay.show { display: block; }
        }
    </style>
</head>
<body>
    <!-- 로그인/회원가입 -->
    <div id="login">
        <div id="login-box">
            <div class="form-title" id="form-title">💬 로그인</div>
            <input id="nickname-input" placeholder="닉네임 (12자 이내)" maxlength="12">
            <input id="password-input" type="password" placeholder="비밀번호 (4자 이상)">
            <button id="primary-btn" onclick="submitForm()">로그인</button>
            <button class="secondary" onclick="toggleMode()" id="toggle-btn">계정이 없나요? 회원가입</button>
            <div id="login-error"></div>
        </div>
    </div>
    
    <!-- 메인 -->
    <div id="app">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <div id="sidebar">
            <div id="sidebar-header">
                <span id="my-nick">닉네임</span>
                <button id="logout-btn" onclick="logout()" title="로그아웃">⏻</button>
            </div>
            <div id="sidebar-content">
                <div class="section">
                    <div class="section-title">
                        <span>채팅방</span>
                        <button class="add-btn" onclick="showCreateRoom()">+</button>
                    </div>
                    <div id="room-list"></div>
                </div>
                <div class="section">
                    <div class="section-title">
                        <span>접속자 (<span id="user-count">0</span>)</span>
                    </div>
                    <div id="user-list"></div>
                </div>
            </div>
        </div>
        
        <div id="main">
            <div id="main-header">
                <div style="display:flex; align-items:center; min-width:0;">
                    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
                    <h2 id="current-room-name">방을 선택하세요</h2>
                </div>
                <div class="user-count" id="current-user-count"></div>
            </div>
            <div id="chat">
                <div id="welcome">
                    👈 왼쪽에서 채팅방을 선택하거나<br>
                    접속자를 클릭해서 DM을 시작하세요
                </div>
            </div>
            <div id="typing-indicator"></div>
            <div id="inputs">
                <input id="msg" placeholder="메시지 입력..." autocomplete="off" disabled>
                <button id="send-btn" onclick="sendMsg()" disabled>전송</button>
            </div>
        </div>
    </div>
    
    <!-- 방 만들기 모달 -->
    <div id="create-modal" class="modal">
        <div class="modal-box">
            <h3>새 채팅방 만들기</h3>
            <input id="room-name" placeholder="방 이름 (20자 이내)" maxlength="20">
            <input id="room-pw" type="password" placeholder="비밀번호 (선택)">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideCreateRoom()">취소</button>
                <button class="btn-confirm" onclick="createRoom()">만들기</button>
            </div>
        </div>
    </div>
    
    <!-- 비번 입력 모달 -->
    <div id="pw-modal" class="modal">
        <div class="modal-box">
            <h3 id="pw-modal-title">비밀번호 입력</h3>
            <input id="join-pw" type="password" placeholder="비밀번호">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hidePwModal()">취소</button>
                <button class="btn-confirm" onclick="joinWithPw()">입장</button>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let myNick = '';
        let currentRoom = null;
        let currentRoomType = null;
        let pendingJoinRoomId = null;
        let typingTimer = null;
        let isTyping = false;
        let typingUsers = new Set();
        let isLoginMode = true;
        
        // 자동 로그인 (저장된 정보로)
        window.addEventListener('load', () => {
            const savedNick = localStorage.getItem('nick');
            const savedPw = localStorage.getItem('pw');
            if (savedNick && savedPw) {
                document.getElementById('nickname-input').value = savedNick;
                document.getElementById('password-input').value = savedPw;
                submitForm();
            }
        });

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').textContent = isLoginMode ? '💬 로그인' : '✨ 회원가입';
            document.getElementById('primary-btn').textContent = isLoginMode ? '로그인' : '회원가입';
            document.getElementById('toggle-btn').textContent = isLoginMode 
                ? '계정이 없나요? 회원가입' 
                : '이미 계정이 있나요? 로그인';
            document.getElementById('login-error').textContent = '';
        }

        async function submitForm() {
            const nick = document.getElementById('nickname-input').value.trim();
            const pw = document.getElementById('password-input').value;
            const errEl = document.getElementById('login-error');
            
            if (!nick) { errEl.textContent = '닉네임을 입력하세요'; return; }
            if (pw.length < 4) { errEl.textContent = '비밀번호는 4자 이상'; return; }
            
            const url = isLoginMode ? '/api/login' : '/api/register';
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({nickname: nick, password: pw})
                });
                const data = await res.json();
                
                if (!res.ok) {
                    errEl.textContent = data.error || '오류가 발생했습니다';
                    return;
                }
                
                if (!isLoginMode) {
                    // 회원가입 성공 -> 자동 로그인
                    isLoginMode = true;
                    await submitForm();
                    return;
                }
                
                // 로그인 성공
                localStorage.setItem('nick', nick);
                localStorage.setItem('pw', pw);
                myNick = nick;
                connectSocket();
            } catch(e) {
                errEl.textContent = '네트워크 오류';
            }
        }
        
        function logout() {
            if (!confirm('로그아웃 하시겠습니까?')) return;
            localStorage.removeItem('nick');
            localStorage.removeItem('pw');
            location.reload();
        }
        
        function connectSocket() {
            socket = io();
            
            socket.on('connect', () => {
                socket.emit('connect_user', { nickname: myNick });
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('my-nick').textContent = '👤 ' + myNick;
                
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            });
            
            socket.on('force_logout', (msg) => {
                alert(msg);
                logout();
            });
            
            socket.on('user_list', (list) => renderUserList(list));
            socket.on('room_list', (list) => renderRoomList(list));
            
            socket.on('room_created', (data) => {
                hideCreateRoom();
                socket.emit('join_room', { room_id: data.id });
            });
            
            socket.on('join_success', (data) => {
                currentRoom = data.room_id;
                currentRoomType = data.type;
                document.getElementById('current-room-name').textContent = data.room_name;
                document.getElementById('chat').innerHTML = '';
                document.getElementById('msg').disabled = false;
                document.getElementById('send-btn').disabled = false;
                document.getElementById('msg').focus();
                typingUsers.clear();
                updateTypingIndicator();
                hideSidebarMobile();
                
                // 이전 메시지 표시
                if (data.history && data.history.length > 0) {
                    addSystem('━━ 이전 대화 ━━');
                    data.history.forEach(m => {
                        addMessage(m.nickname, m.msg);
                    });
                    addSystem('━━ 새 메시지 ━━');
                }
            });
            
            socket.on('join_error', (msg) => {
                alert(msg);
                hidePwModal();
            });
            
            socket.on('error_msg', (msg) => alert(msg));
            
            socket.on('message', (data) => {
                addMessage(data.nickname, data.msg);
                
                if (data.nickname !== myNick) {
                    playDing();
                    if ('vibrate' in navigator) navigator.vibrate(100);
                    
                    if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
                        new Notification(data.nickname, {
                            body: data.msg,
                            tag: 'chat-msg'
                        });
                    }
                }
            });
            
            socket.on('system', (msg) => addSystem(msg));
            
            socket.on('typing', (data) => {
                if (data.typing) typingUsers.add(data.nickname);
                else typingUsers.delete(data.nickname);
                updateTypingIndicator();
            });
        }
        
        function renderRoomList(list) {
            const div = document.getElementById('room-list');
            div.innerHTML = '';
            if (list.length === 0) {
                div.innerHTML = '<div style="color:#72767d; font-size:12px; padding:8px;">방이 없습니다</div>';
                return;
            }
            list.forEach(room => {
                const item = document.createElement('div');
                item.className = 'item' + (room.id === currentRoom ? ' active' : '');
                item.innerHTML = `
                    <span class="icon">#</span>
                    <span class="name">${escapeHtml(room.name)}</span>
                    ${room.has_password ? '<span class="lock-icon">🔒</span>' : ''}
                    <span class="count">${room.user_count}</span>
                `;
                item.onclick = () => joinRoom(room.id, room.has_password, room.name);
                div.appendChild(item);
            });
        }
        
        function renderUserList(list) {
            const div = document.getElementById('user-list');
            div.innerHTML = '';
            document.getElementById('user-count').textContent = list.length;
            list.forEach(user => {
                if (user.nickname === myNick) return;
                const item = document.createElement('div');
                item.className = 'item';
                item.innerHTML = `
                    <span class="icon" style="color:#3ba55c;">●</span>
                    <span class="name">${escapeHtml(user.nickname)}</span>
                `;
                item.onclick = () => startDm(user.nickname);
                div.appendChild(item);
            });
        }
        
        function joinRoom(roomId, hasPassword, roomName) {
            if (hasPassword) {
                pendingJoinRoomId = roomId;
                document.getElementById('pw-modal-title').textContent = `🔒 ${roomName}`;
                document.getElementById('join-pw').value = '';
                document.getElementById('pw-modal').classList.add('show');
                document.getElementById('join-pw').focus();
            } else {
                socket.emit('join_room', { room_id: roomId });
            }
        }
        
        function joinWithPw() {
            const pw = document.getElementById('join-pw').value;
            socket.emit('join_room', { room_id: pendingJoinRoomId, password: pw });
            hidePwModal();
        }
        
        function hidePwModal() {
            document.getElementById('pw-modal').classList.remove('show');
        }
        
        function startDm(nickname) {
            socket.emit('start_dm', { nickname: nickname });
            hideSidebarMobile();
        }
        
        function showCreateRoom() {
            document.getElementById('room-name').value = '';
            document.getElementById('room-pw').value = '';
            document.getElementById('create-modal').classList.add('show');
            document.getElementById('room-name').focus();
        }
        
        function hideCreateRoom() {
            document.getElementById('create-modal').classList.remove('show');
        }
        
        function createRoom() {
            const name = document.getElementById('room-name').value.trim();
            const pw = document.getElementById('room-pw').value.trim();
            if (!name) { alert('방 이름을 입력하세요'); return; }
            socket.emit('create_room', { name: name, password: pw });
        }
        
        function sendMsg() {
            const input = document.getElementById('msg');
            const msg = input.value.trim();
            if (!msg || !currentRoom) return;
            socket.emit('message', { msg: msg });
            input.value = '';
            input.focus();
            
            if (isTyping) {
                isTyping = false;
                socket.emit('typing', { typing: false });
            }
        }
        
        function addMessage(nickname, msg) {
            const chat = document.getElementById('chat');
            const wrap = document.createElement('div');
            wrap.className = 'msg-wrap ' + (nickname === myNick ? 'me' : 'other');
            
            const nickDiv = document.createElement('div');
            nickDiv.className = 'nick';
            nickDiv.textContent = nickname;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = msg;
            
            wrap.appendChild(nickDiv);
            wrap.appendChild(bubble);
            chat.appendChild(wrap);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function addSystem(msg) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'system';
            div.textContent = msg;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function updateTypingIndicator() {
            const div = document.getElementById('typing-indicator');
            const arr = Array.from(typingUsers);
            if (arr.length === 0) div.textContent = '';
            else if (arr.length === 1) div.textContent = `${arr[0]}님이 입력 중...`;
            else if (arr.length === 2) div.textContent = `${arr[0]}, ${arr[1]}님이 입력 중...`;
            else div.textContent = `${arr.length}명이 입력 중...`;
        }
        
        function playDing() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch(e) {}
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
            document.getElementById('sidebar-overlay').classList.toggle('show');
        }
        
        function hideSidebarMobile() {
            document.getElementById('sidebar').classList.remove('show');
            document.getElementById('sidebar-overlay').classList.remove('show');
        }
        
        document.getElementById('msg').addEventListener('input', () => {
            if (!currentRoom) return;
            if (!isTyping) {
                isTyping = true;
                socket.emit('typing', { typing: true });
            }
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                isTyping = false;
                socket.emit('typing', { typing: false });
            }, 2000);
        });
        
        document.getElementById('msg').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });
        document.getElementById('nickname-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('password-input').focus();
        });
        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitForm();
        });
        document.getElementById('room-name').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') createRoom();
        });
        document.getElementById('join-pw').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinWithPw();
        });
    </script>
</body>
</html>
